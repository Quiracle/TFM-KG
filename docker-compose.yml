services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tfmkg}
      POSTGRES_USER: ${POSTGRES_USER:-tfmkg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tfmkg}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tfmkg} -d ${POSTGRES_DB:-tfmkg}"]
      interval: 5s
      timeout: 5s
      retries: 20

  fuseki:
    image: stain/jena-fuseki:5.1.0
    environment:
      # creates a dataset at startup
      ADMIN_PASSWORD: "admin"
      FUSEKI_DATASET_1: "${FUSEKI_DATASET:-kg}"
    ports:
      - "${FUSEKI_PORT:-3030}:3030"
    volumes:
      - fusekidata:/fuseki
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3030/$/ping"]
      interval: 10s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    environment:
      # Service-to-service URLs inside compose network
      DATABASE_URL: "postgresql+psycopg://${POSTGRES_USER:-tfmkg}:${POSTGRES_PASSWORD:-tfmkg}@postgres:5432/${POSTGRES_DB:-tfmkg}"
      FUSEKI_URL: "http://fuseki:3030"
      OLLAMA_BASE_URL: "http://ollama:11434"
      OLLAMA_EMBED_MODEL: "embeddinggemma"
      OLLAMA_LLM_MODEL: "mistral:7b"
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      fuseki:
        condition: service_healthy
      ollama:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"   # optional: expose to host for manual testing
    volumes:
      - ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 20

  open-webui:
    container_name: open-webui
    image: ghcr.io/open-webui/open-webui:latest
    volumes:
      - open-webui:/app/backend/data
    environment:
      - WEBUI_AUTH=False
      - OPENAI_API_BASE_URL=http://0.0.0.0:8000/v1
      - RAG_EMBEDDING_ENGINE=ollama
      - RAG_EMBEDDING_MODEL=embeddinggemma:latest
      - RAG_OLLAMA_BASE_URL=http://ollama:11434
      - ENABLE_RAG=True
      - VECTOR_DB=pgvector
      - PGVECTOR_DB_URL=postgresql://${POSTGRES_USER:-tfmkg}:${POSTGRES_PASSWORD:-tfmkg}@postgres:5432/${POSTGRES_DB:-tfmkg}
    ports:
      - "3001:8080"
    restart: unless-stopped

volumes:
  pgdata:
  fusekidata:
  ollama:
  open-webui:
